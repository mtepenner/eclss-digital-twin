apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eclss-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/websocket-services: "ws-bridge"
spec:
  rules:
    - host: eclss.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: central-terminal
                port:
                  number: 3000
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: ws-bridge
                port:
                  number: 9090
---
apiVersion: v1
kind: Service
metadata:
  name: central-terminal
spec:
  selector:
    app: central-terminal
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: ws-bridge
spec:
  selector:
    app: ws-bridge
  ports:
    - port: 9090
      targetPort: 9090

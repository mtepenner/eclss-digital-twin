# NATS Server Configuration for ECLSS Digital Twin
port: 4222
http_port: 8222

# Logging
debug: false
trace: false

# Authorization
authorization {
  default_permissions {
    publish: ["eclss.>"]
    subscribe: ["eclss.>"]
  }
}

# Cluster name
server_name: eclss-event-bus

# Max payload size (1MB)
max_payload: 1048576

# Client connection settings
max_connections: 256
ping_interval: "30s"
ping_max: 3

# Write deadline for slow consumers
write_deadline: "10s"
